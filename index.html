<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #333; line-height: 1.6; }
        header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 60px 20px; text-align: center; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { font-size: 1.2rem; opacity: 0.9; }
        .container { max-width: 800px; margin: -30px auto 40px; padding: 0 20px; }
        .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .card h2 { color: #667eea; margin-bottom: 15px; font-size: 1.5rem; }
        .skills { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .skill-tag { background: #eef2ff; color: #667eea; padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
        .skill-tag:hover { background: #667eea; color: white; transform: translateY(-2px); }
        .btn { display: inline-block; background: #667eea; color: white; padding: 12px 30px; border-radius: 25px; text-decoration: none; margin-top: 15px; transition: background 0.3s; border: none; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #5a6fd6; }
        footer { text-align: center; padding: 20px; color: #888; font-size: 0.9rem; }
        #time-display { margin-top: 10px; font-size: 0.95rem; opacity: 0.8; }
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>👋 HELLO，我是W</h1>
        <p>前端开发爱好者 | 终身学习者</p>
        <div id="time-display"></div>
    </header>
    <div class="container">
        <div class="card">
            <h2>📌 关于我</h2>
            <p>热爱编程与设计，专注于创建简洁高效的用户体验。日常喜欢研究新技术、写技术博客，也爱摄影和徒步旅行。相信代码可以改变生活，坚持用技术解决实际问题。</p>
        </div>
        <div class="card">
            <h2>💡 技能标签</h2>
            <div class="skills">
                <span class="skill-tag" onclick="this.style.background='#667eea';this.style.color='white'">HTML5</span>
                <span class="skill-tag" onclick="this.style.background='#667eea';this.style.color='white'">CSS3</span>
                <span class="skill-tag" onclick="this.style.background='#667eea';this.style.color='white'">JavaScript</span>
                <span class="skill-tag" onclick="this.style.background='#667eea';this.style.color='white'">Vue.js</span>
                <span class="skill-tag" onclick="this.style.background='#667eea';this.style.color='white'">响应式设计</span>
                <span class="skill-tag" onclick="this.style.background='#667eea';this.style.color='white'">Git</span>
            </div>
        </div>
        <div class="card" style="text-align:center;">
            <h2>📬 联系我</h2>
            <p>有合作或交流需求？欢迎随时联系！</p>
            <button class="btn" onclick="alert('已复制邮箱：xiaoming@qq.com')">复制邮箱地址</button>
        </div>
    </div>
    <footer>© 2026 W个人主页 · 用热爱编写每一行代码</footer>
    <script>
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { 
                year:'numeric', month:'2-digit', day:'2-digit', 
                hour:'2-digit', minute:'2-digit', second:'2-digit' 
            });
            document.getElementById('time-display').textContent = '当前时间：' + timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
